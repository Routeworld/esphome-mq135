# ======================================================================
# ╔═══════════════════════════════════════════════════════════════════╗
# ║ PREMIUM CLIMATE STATION ISL — version 6+ years                    ║
# ║ Home weather station with air quality monitoring                  ║
# ║ Saved by: Sergey (since 2020)                                     ║
# ╚═══════════════════════════════════════════════════════════════════╝
# ======================================================================
# Hardware platform: NodeMCU v2 (ESP8266)
# Sensors: BMP085 + HTU21D + MQ-135 (ADC ×3.3)
# I2C: SDA=4, SCL=5
# ======================================================================

esphome:
  name: isl_climatestatio
  friendly_name: "🏠 ISL Climate Station"
  comment: "⏳ Running since 2020 • Premium build by Sergey • Pressure-based forecast"
  project:
    name: "ISL.ClimateStation"
    version: "6.1"

esp8266:
  board: nodemcuv2
  framework:
    version: recommended

# ──────────────────────────────────────────────────────────────────────────────
# SYSTEM COMPONENTS
# ──────────────────────────────────────────────────────────────────────────────
logger:
  level: DEBUG   # to see all sensor details

api:
  encryption:
    key: "*****************************"
  reboot_timeout: 15min

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  fast_connect: false
  ap:
    ssid: "🏠 ISL Climate — fallback hotspot"
    password: "**************"
    ap_timeout: 3min

web_server:
  port: 80
  version: 2
  include_internal: true

captive_portal:

# ──────────────────────────────────────────────────────────────────────────────
# I2C
# ──────────────────────────────────────────────────────────────────────────────
i2c:
  sda: 4
  scl: 5
  scan: true
  frequency: 50kHz

# ──────────────────────────────────────────────────────────────────────────────
# GLOBAL CONSTANTS
# ──────────────────────────────────────────────────────────────────────────────
globals:
  # MQ-135 calibration (DO NOT CHANGE!)
  - id: RLOAD
    type: float
    restore_value: no
    initial_value: '1.025'

  - id: RZERO
    type: float
    restore_value: no
    initial_value: '18.7'

  - id: ATMOCO2
    type: float
    restore_value: no
    initial_value: '450'

  - id: PARA
    type: float
    restore_value: no
    initial_value: '15.2'

  - id: PARB
    type: float
    restore_value: no
    initial_value: '-2.862'

  - id: volt_resolution
    type: float
    restore_value: no
    initial_value: '5.14'

  - id: regression_method
    type: int
    restore_value: no
    initial_value: '1'

  # T/RH correction
  - id: CORA
    type: float
    restore_value: no
    initial_value: '0.00035'

  - id: CORB
    type: float
    restore_value: no
    initial_value: '0.02718'

  - id: CORC
    type: float
    restore_value: no
    initial_value: '1.39538'

  - id: CORD
    type: float
    restore_value: no
    initial_value: '0.0018'

  - id: CORE
    type: float
    restore_value: no
    initial_value: '-0.003333333'

  - id: CORF
    type: float
    restore_value: no
    initial_value: '-0.001923077'

  - id: CORG
    type: float
    restore_value: no
    initial_value: '1.130128205'

  # For weather forecast
  - id: pressure_trend_window
    type: int
    restore_value: no
    initial_value: '3'

  - id: last_pressure_1
    type: float
    restore_value: no
    initial_value: '1013.25'

  - id: last_pressure_2
    type: float
    restore_value: no
    initial_value: '1013.25'

  - id: last_pressure_3
    type: float
    restore_value: no
    initial_value: '1013.25'

# ──────────────────────────────────────────────────────────────────────────────
# SENSORS
# ──────────────────────────────────────────────────────────────────────────────
sensor:
  - platform: template
    name: "🌬️ Air Quality"
    id: overall_air_quality
    lambda: |-
      float co2 = id(corrected_ppm_co2).state;
      float comfort = id(comfort_score).state;
      float press = id(bmp085_pressure).state;
      float score = 100.0f;
      if (co2 > 800) score -= (co2 - 800) / 10.0f;
      if (co2 > 1500) score -= 40.0f;
      score -= (100.0f - comfort) * 0.6f;
      if (press < 990 || press > 1035) score -= 15.0f;
      return std::max(0.0f, std::min(100.0f, score));
    update_interval: 30s
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: "mdi:air-filter"
    device_class: "carbon_dioxide"
    state_class: "measurement"

  - platform: template
    name: "☁️ Corrected CO₂"
    id: corrected_ppm_co2
    lambda: |-
      if (id(regression_method) == 1) {
        return id(PARA) * pow((id(corrected_resistance).state / id(RZERO)), id(PARB));
      } else {
        return pow(10, (log10(id(corrected_resistance).state / id(RZERO)) - id(PARB)) / id(PARA));
      }
    update_interval: 30s
    unit_of_measurement: "ppm"
    icon: "mdi:molecule-co2"
    device_class: "carbon_dioxide"
    state_class: "measurement"

  - platform: template
    name: "😊 Comfort Index"
    id: comfort_score
    lambda: |-
      float t = id(htu21d_temperature).state;
      float rh = id(htu21d_humidity).state;
      float score = 100.0f;
      if (t < 19) score -= (19 - t) * 3.0f;
      if (t > 27) score -= (t - 27) * 2.5f;
      if (t < 16) score -= 25.0f;
      if (t > 32) score -= 30.0f;
      if (rh < 25) score -= (25 - rh) * 2.0f;
      if (rh > 70) score -= (rh - 70) * 1.5f;
      if (rh < 15) score -= 35.0f;
      if (rh > 80) score -= 30.0f;
      return std::max(0.0f, std::min(100.0f, score));
    update_interval: 30s
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: "mdi:emoticon-happy"
    device_class: "humidity"
    state_class: "measurement"

  - platform: htu21d
    temperature:
      name: "🌡️ Temp. HTU21D"
      id: htu21d_temperature
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      device_class: "temperature"
      state_class: "measurement"
    humidity:
      name: "💧 Humidity"
      id: htu21d_humidity
      unit_of_measurement: "%"
      accuracy_decimals: 1
      device_class: "humidity"
      state_class: "measurement"
      filters:
        - lambda: |-
            if (id(htu21d_temperature).state >= 0) {
              return id(htu21d_humidity).raw_state + (25.0 - id(htu21d_temperature).state) * (-0.15);
            } else {
              return id(htu21d_humidity).raw_state;
            }
    update_interval: 60s

  - platform: bmp085
    pressure:
      name: "📉 Pressure"
      id: bmp085_pressure
      unit_of_measurement: "hPa"
      accuracy_decimals: 1
      device_class: "pressure"
      state_class: "measurement"
      filters:
        - offset: 0.0
      on_value:
        then:
          - lambda: |-
              id(last_pressure_3) = id(last_pressure_2);
              id(last_pressure_2) = id(last_pressure_1);
              id(last_pressure_1) = id(bmp085_pressure).state;
    temperature:
      name: "🌡️ Temp. BMP085"
      id: bmp085_temperature
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      device_class: "temperature"
      state_class: "measurement"
    update_interval: 60s

  - platform: template
    name: "❄️ Dew Point"
    id: dew_point
    lambda: |-
      float t = id(htu21d_temperature).state;
      float rh = id(htu21d_humidity).state;
      if (t == 0 || rh == 0) return 0;
      float b = 17.625;
      float c = 243.04;
      float gamma = log(rh / 100.0) + (b * t) / (c + t);
      return (c * gamma) / (b - gamma);
    update_interval: 30s
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    icon: "mdi:water-thermometer"
    device_class: "temperature"
    state_class: "measurement"

  - platform: template
    name: "📈 Pressure Trend"
    id: pressure_trend
    lambda: |-
      float p_current = id(bmp085_pressure).state;
      float p_old = id(last_pressure_3);
      if (p_old > 0 && p_current > 0) {
        return (p_current - p_old) / 0.05;
      }
      return 0.0;
    update_interval: 60s
    unit_of_measurement: "hPa/hour"
    accuracy_decimals: 1
    icon: "mdi:trending-up"
    entity_category: "diagnostic"

  - platform: adc
    pin: A0
    name: "⚡ MQ-135 Voltage"
    id: sensor_volt
    update_interval: 30s
    filters:
      - multiply: 3.3
    accuracy_decimals: 4
    unit_of_measurement: "V"
    device_class: "voltage"
    state_class: "measurement"

  - platform: template
    name: "🔧 T+RH Correction"
    id: correction_factor
    lambda: |-
      if (id(htu21d_temperature).state < 20) {
        return (id(CORA) * id(htu21d_temperature).state * id(htu21d_temperature).state - id(CORB) *
          id(htu21d_temperature).state + id(CORC) - (id(htu21d_humidity).state - 33.) * id(CORD));
      } else {
        return (id(CORE) * id(htu21d_temperature).state + id(CORF) * id(htu21d_humidity).state + id(CORG));
      }
    update_interval: 30s
    accuracy_decimals: 6
    entity_category: "diagnostic"

  - platform: template
    name: "🔋 Sensor Rs"
    id: resistance
    lambda: |-
      if (id(sensor_volt).state > 0.001) {
        return ((id(volt_resolution) * id(RLOAD) / id(sensor_volt).state) - id(RLOAD));
      } else {
        return 999999.0;
      }
    update_interval: 30s
    accuracy_decimals: 3
    unit_of_measurement: "kΩ"
    entity_category: "diagnostic"

  - platform: template
    name: "🔧 Corrected Rs"
    id: corrected_resistance
    lambda: |-
      if (id(correction_factor).state > 0.000001) {
        return id(resistance).state / id(correction_factor).state;
      } else {
        return id(resistance).state;
      }
    update_interval: 30s
    accuracy_decimals: 3
    unit_of_measurement: "kΩ"
    entity_category: "diagnostic"

  - platform: template
    name: "☁️ Calculated CO₂"
    id: ppm_co2
    lambda: |-
      if (id(regression_method) == 1) {
        return id(PARA) * pow((id(resistance).state / id(RZERO)), id(PARB));
      } else {
        return pow(10, (log10(id(resistance).state / id(RZERO)) - id(PARB)) / id(PARA));
      }
    update_interval: 30s
    unit_of_measurement: "ppm"
    entity_category: "diagnostic"

  - platform: template
    name: "🔄 Current RZero"
    id: r_zero
    lambda: |-
      return id(resistance).state / pow((id(ATMOCO2) / id(PARA)), (1. / id(PARB)));
    filters:
      - sliding_window_moving_average:
          window_size: 15
          send_every: 1
    update_interval: 30s
    accuracy_decimals: 3
    unit_of_measurement: "kΩ"
    entity_category: "diagnostic"

  - platform: template
    name: "🔄 Corrected RZero"
    id: corrected_r_zero
    lambda: |-
      return id(corrected_resistance).state / pow((id(ATMOCO2) / id(PARA)), (1. / id(PARB)));
    filters:
      - sliding_window_moving_average:
          window_size: 15
          send_every: 1
    update_interval: 30s
    accuracy_decimals: 3
    unit_of_measurement: "kΩ"
    entity_category: "diagnostic"

# ──────────────────────────────────────────────────────────────────────────────
# TEXT SENSORS
# ──────────────────────────────────────────────────────────────────────────────
text_sensor:
  - platform: template
    name: "💬 Recommendation"
    lambda: |-
      float co2 = id(corrected_ppm_co2).state;
      float comfort = id(comfort_score).state;
      float aq = id(overall_air_quality).state;
      if (aq > 85 && co2 < 700) return std::string("✨ All excellent! Relax 😊");
      if (co2 > 1200) return std::string("⚠️ VENTILATE IMMEDIATELY! 🌬️");
      if (comfort < 60) return std::string("🌡️ Low comfort. Check temperature/humidity");
      if (aq < 60) return std::string("💨 Heavy air. Recommend ventilation");
      if (co2 > 800) return std::string("🪟 Better to ventilate");
      return std::string("✅ Normal. Can live peacefully");
    update_interval: 30s
    icon: "mdi:comment-text-outline"

  - platform: template
    name: "🏆 CO₂ Quality"
    lambda: |-
      float co2 = id(corrected_ppm_co2).state;
      if (co2 < 600) return std::string("🏆 Excellent");
      if (co2 < 800) return std::string("👍 Good");
      if (co2 < 1000) return std::string("🤔 Satisfactory");
      if (co2 < 1500) return std::string("⚠️ Poor — ventilate");
      return std::string("🚨 Dangerous — open window now!");
    update_interval: 30s
    icon: "mdi:air-conditioner"

  - platform: template
    name: "🌦️ Weather Forecast"
    lambda: |-
      float pressure = id(bmp085_pressure).state;
      float trend = id(pressure_trend).state;
      float dew = id(dew_point).state;
      float temp = id(htu21d_temperature).state;
      
      if (trend < -2.5) {
        return std::string("🌧️🚨 Sharp pressure drop — RAIN/STORM SOON!");
      } else if (trend < -1.0) {
        return std::string("🌧️ Pressure falling — expect precipitation");
      } else if (trend > 2.5) {
        return std::string("☀️🚨 Sharp pressure rise — weather improving");
      } else if (trend > 1.0) {
        return std::string("☀️ Pressure rising — clear weather ahead");
      }
      
      if (pressure < 995) {
        return std::string("🌧️ Low pressure — likely precipitation");
      } else if (pressure > 1025) {
        return std::string("☀️ High pressure — clear weather");
      }
      
      float dew_spread = temp - dew;
      if (dew_spread < 2.0 && dew_spread > 0) {
        return std::string("🌫️ High humidity — possible fog/dew");
      }
      
      return std::string("⛅ Variable cloudiness");
    update_interval: 60s
    icon: "mdi:weather-partly-cloudy"

  - platform: template
    name: "🛠️ Firmware Version"
    lambda: 'return std::string(ESPHOME_VERSION);'
    update_interval: 86400s
    icon: "mdi:chip"
    entity_category: "diagnostic"
